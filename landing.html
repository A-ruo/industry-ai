<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业洞察 · AI 分析工作台</title>
    <style>
        :root {
            --bg: #0a0c14;
            --accent: #2e7dfc;
            --accent-glow: #4d94ff;
            --text: #e0e3eb;
            --text-secondary: #8b8f9e;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        canvas#particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            animation: fadeInUp 1.2s ease-out;
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .main-title {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 0.8rem;
            background: linear-gradient(135deg, #ffffff 0%, #a0c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sub-title {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .features {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .feature-card {
            background: rgba(26, 29, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(46, 125, 252, 0.25);
            border-radius: 14px;
            padding: 1.5rem 2rem;
            width: 200px;
            transition: all 0.3s;
            animation: fadeInUp 1.2s ease-out backwards;
        }
        .feature-card:nth-child(1) { animation-delay: 0.2s; }
        .feature-card:nth-child(2) { animation-delay: 0.4s; }
        .feature-card:nth-child(3) { animation-delay: 0.6s; }
        .feature-card:nth-child(4) { animation-delay: 0.8s; }

        .feature-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 12px 30px rgba(46, 125, 252, 0.2);
        }

        .feature-icon {
            font-size: 2rem;
            margin-bottom: 0.8rem;
        }
        .feature-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.4rem;
            color: #fff;
        }
        .feature-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .btn-enter {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #6b3ff5);
            color: #fff;
            padding: 0.9rem 3rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(46, 125, 252, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 35px rgba(46, 125, 252, 0.45);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.6;
        }
                    .brand-gradient {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #4d94ff, #a78bfa, #f59e0b, #4d94ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            animation: gradientFlow 3s ease infinite;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }


        .title-divider {
            font-size: 2.2rem;
            color: rgba(255,255,255,0.3);
            margin: 0 0.5rem;
            font-weight: 300;
            vertical-align: middle;
        }

        .title-text {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff 0%, #a0c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="container">
                <div class="logo-icon">🔍</div>
        <h1 class="main-title">
            <span class="brand-gradient">iAnalyst</span>
            <span class="title-divider">·</span>
            <span class="title-text">行业 / 企业洞察 AI 分析工作台</span>
        </h1>
        <p class="sub-title">基于 DeepSeek 大模型，系统化剖析行业与企业，辅助证券分析决策</p>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">🧩</div>
                <div class="feature-title">行业四步框架</div>
                <div class="feature-desc">从框架速览到景气度判断，快速建立行业认知</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🏢</div>
                <div class="feature-title">企业 16 维度分析</div>
                <div class="feature-desc">覆盖盈利、成长、护城河、杜邦等全方位深度剖析</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📡</div>
                <div class="feature-title">景气度专项研判</div>
                <div class="feature-desc">高频指标监控，捕捉行业拐点与趋势方向</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📄</div>
                <div class="feature-title">AI 综合研报生成</div>
                <div class="feature-desc">一键生成专业投资分析报告，支持快速/深度模式</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📖</div>
                <div class="feature-title">分析全流程手册</div>
                <div class="feature-desc">内置证券分析八步法，从行业比较到复盘迭代全覆盖</div>
            </div>
        </div>

        <a href="index.html" class="btn-enter">进入分析台</a>

        <div class="footer-note">
            iAnalyst · Powered by DeepSeek · 数据仅供参考，不构成投资建议
        </div>
    </div>

    <script>
        // 渐变粒子背景
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            initParticles();
        }

        function initParticles() {
            particles = [];
            const count = Math.floor(width * height / 8000);
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    r: Math.random() * 2.5 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.4,
                    hue: Math.random() * 60 + 200 // 蓝紫色范围
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            // 绘制渐变连线
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 70%, 65%, 0.8)`;
                ctx.fill();

                // 连线
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `hsla(${p.hue}, 70%, 65%, ${0.15 * (1 - dist / 120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }

        function update() {
            for (let p of particles) {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0 || p.x > width) p.speedX *= -1;
                if (p.y < 0 || p.y > height) p.speedY *= -1;
            }
        }

        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
