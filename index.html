<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业洞察 · 分析工作台</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg: #0f1117;
            --card-bg: #1a1d27;
            --card-bg-hover: #212433;
            --border: #2a2e3a;
            --text: #e0e3eb;
            --text-secondary: #8b8f9e;
            --accent: #2e7dfc;
            --accent-glow: #4d94ff;
            --green: #0fba83;
            --red: #f23b4c;
            --orange: #f59e0b;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            font-family: var(--font);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
        }
        .container { max-width: 1200px; width: 100%; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.3px; color: #fff; }
        .logo span { color: var(--accent); }

        .tab-group {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .tab-btn {
            padding: 0.5rem 1.2rem;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: var(--font);
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .tab-btn.active { background: var(--accent); color: #fff; }
        .tab-btn:not(.active):hover { color: #fff; background: rgba(255,255,255,0.05); }

        .search-box {
            display: flex;
            gap: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            align-items: center;
            margin-bottom: 2rem;
        }
        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 0.95rem;
            width: 100%;
            font-family: var(--font);
        }
        .search-box input::placeholder { color: var(--text-secondary); }
        .search-btn {
            background: var(--accent);
            border: none;
            color: #fff;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            font-family: var(--font);
            white-space: nowrap;
        }
        .search-btn:hover { background: var(--accent-glow); }
        .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .industry-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: #fff;
        }
        .industry-sub {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2rem;
        }
        .metric-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.3rem 1.4rem;
            transition: all 0.2s;
        }
        .metric-card:hover { background: var(--card-bg-hover); border-color: #3a3f53; }
        .metric-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        .metric-value { font-size: 1.6rem; font-weight: 700; color: #fff; margin-bottom: 0.2rem; }
        .metric-context { font-size: 0.85rem; color: var(--text-secondary); }
        .trend-up { color: var(--green); }
        .trend-down { color: var(--red); }

        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 1.2rem;
            transition: background 0.2s;
        }
        .section-card:hover { background: var(--card-bg-hover); }
        .section-title {
            font-size: 1.1rem;
            font-weight: 650;
            margin-bottom: 0.8rem;
            color: #fff;
            border-left: 3px solid var(--accent);
            padding-left: 0.8rem;
        }
        .section-content {
            color: #cbd0db;
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .section-content ul { list-style: none; padding-left: 0; }
        .section-content li { margin-bottom: 0.4rem; display: flex; gap: 0.6rem; }
        .section-content li::before {
            content: "●";
            color: var(--accent);
            font-size: 0.7rem;
            margin-top: 0.4rem;
        }

        .chart-bar {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin: 0.5rem 0;
        }
        .chart-bar .label { width: 80px; font-size: 0.85rem; color: var(--text-secondary); }
        .chart-bar .bar-bg { flex: 1; background: #242836; border-radius: 4px; height: 8px; overflow: hidden; }
        .chart-bar .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); }

        .footer-note {
            margin-top: 2.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .loading-text { color: var(--text-secondary); text-align: center; padding: 3rem 2rem; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-text { color: #f23b4c; padding: 1rem; background: #2d1f21; border-radius: 6px; }
        .placeholder-note {
            color: var(--orange);
            padding: 2rem;
            text-align: center;
            background: var(--card-bg);
            border-radius: 10px;
        }

        .section-content { writing-mode: horizontal-tb !important; text-orientation: mixed; }
        .section-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: #cbd0db;
        }
        .section-content th {
            background: #242836;
            color: #fff;
            padding: 0.5rem 0.7rem;
            border: 1px solid var(--border);
            font-weight: 600;
        }
        .section-content td {
            padding: 0.4rem 0.7rem;
            border: 1px solid var(--border);
        }
        .section-content tr:hover td { background: rgba(46,125,252,0.08); }
        .section-content h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #d0d4e0;
            margin: 1rem 0 0.3rem 0;
            padding-left: 0.5rem;
            border-left: 2px solid rgba(46,125,252,0.5);
        }
        .section-content h2 {
            font-size: 1.1rem;
            font-weight: 650;
            color: #fff;
            margin: 1.2rem 0 0.5rem 0;
            padding-left: 0.8rem;
            border-left: 3px solid var(--accent);
        }

        /* 打印样式 */
            @media print {
            body {
                background: #fff !important;
                color: #000 !important;
            }
            /* 隐藏导航、卡片等 */
            .header, .search-box, .tab-group, .footer-note,
            #toggleDataBtn, #dataInputArea, #analysisMode,
            .spinner, .spinner-dual, .loadingio-spinner-magnify-nq4q5u6dq7r,
            .section-card, .metric-card, .btn-enter, .export-pdf-btn,
            #genReportBtn {
                display: none !important;
            }

            .report-document {
                display: block !important;
                background: #fff !important;
                color: #000 !important;
                padding: 1.5rem !important;
                margin: 0 auto !important;
                box-shadow: none !important;
                line-height: 1.8;
            }
            .report-document * {
                color: #000 !important;
                text-shadow: none !important;
                -webkit-text-fill-color: #000 !important;
            }
            .report-document h1,
            .report-document h2,
            .report-document h3 {
                color: #000 !important;
                border-bottom: 1px solid #ccc;
            }
            .report-document table {
                border-color: #000 !important;
            }
            .report-document th {
                background: #e0e0e0 !important;
                color: #000 !important;
                border-color: #000 !important;
            }
            .report-document td {
                border-color: #000 !important;
            }
            .report-document strong {
                color: #000 !important;
            }
            .report-document button {
                display: none !important;
            }
            /* 清除任何内联颜色 */
            [style*="color"] {
                color: #000 !important;
            }
                        /* 确保页面本身无阴影、无背景 */
            html, body {
                background: #fff !important;
                box-shadow: none !important;
            }
            /* 去掉报告里 h2 的蓝色左边框（打印时它会变灰，像阴影） */
            .report-document h2,
            .report-document h3 {
                border-left: none !important;
                padding-left: 0 !important;
            }
        }

        /* ⏳ 弹跳动画 */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
                .report-document {
            background: var(--bg);
            color: var(--text);
            padding: 2rem 0;
            line-height: 1.8;
            font-size: 0.95rem;
            /* 非卡片：无边框、无圆角、无阴影 */
            border: none;
            border-radius: 0;
            box-shadow: none;
            margin-top: 1.5rem;
            font-family: "PingFang SC", "Microsoft YaHei", "SimSun", serif;
        }
        .report-document * {
            color: inherit;
        }
        .report-document h1,
        .report-document h2,
        .report-document h3 {
            color: #ffffff;
            border-bottom: 1px solid var(--border);
        }
        .report-document strong {
            color: var(--accent-glow);
        }
        .report-document table {
            color: var(--text);
            border-color: var(--border);
        }
        .report-document th {
            background: #242836;
            color: #fff;
        }
        .loading-bounce-inline {
            display: inline-block;
            animation: bounce 1s infinite;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📊 行业<span>洞察</span> · 分析工作台</div>
            <div class="tab-group">
                <button class="tab-btn active" id="tabIndustry">📈 行业分析</button>
                <button class="tab-btn" id="tabCompany">🏢 企业分析</button>
            </div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入行业名称，如 光伏、创新药..." value="新能源汽车">
            <select id="analysisMode" style="background: var(--card-bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.6rem; border-radius: 6px; font-family: var(--font); font-size: 0.85rem; cursor: pointer;">
                <option value="deep">🔬 深度研报</option>
                <option value="quick" selected>⚡ 快速概览</option>
                <option value="prosperity">📊 景气度专项</option>
            </select>
            <button class="search-btn" id="searchBtn">AI 分析</button>
        </div>

        <div style="margin-bottom: 1.5rem;">
            <button id="toggleDataBtn" style="background: transparent; border: 1px solid var(--border); color: var(--text-secondary); padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-family: var(--font); font-size: 0.85rem;">
                📋 粘贴关键数据（可选，提高准确度）
            </button>
            <div id="dataInputArea" style="display: none; margin-top: 0.8rem;">
                <textarea id="userDataInput" placeholder="在此粘贴财报摘要、行业数据、新闻等真实信息…&#10;AI 将优先基于这些数据分析，而非使用可能过时的训练数据。" style="width: 100%; height: 100px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 0.8rem; font-family: var(--font); font-size: 0.85rem; resize: vertical;"></textarea>
            </div>
        </div>

        <div id="reportContainer"></div>

        <div class="footer-note">
            ⚡ 基于Deepseek大模型实时生成 · 行业 / 企业双板块
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentTab = 'industry';

        // 折叠/展开数据输入区
        document.getElementById('toggleDataBtn').addEventListener('click', () => {
            const area = document.getElementById('dataInputArea');
            const btn = document.getElementById('toggleDataBtn');
            if (area.style.display === 'none') {
                area.style.display = 'block';
                btn.textContent = '📋 收起数据输入区';
            } else {
                area.style.display = 'none';
                btn.textContent = '📋 粘贴关键数据（可选，提高准确度）';
            }
        });

        // 静态数据
        const staticData = {
            name: "新能源汽车",
            sector: "汽车产业（大类）",
            penetrationRate: "41.3%",
            lifeCycleStage: "成长期向成熟期过渡",
            stageDetail: "高速增长阶段尾部，预计2027年前后进入成熟期",
            marketSize: "4.2万亿人民币（2025E）",
            yoyGrowth: "+28.6%",
            shareOfLargerCategory: "占汽车产业总规模比重约 51%",
            businessModel: "整车制造+软件服务双轮驱动；直销与经销混合；电池租赁、换电服务创造持续收入。",
            moat: ["电池成本与供应链壁垒","智能驾驶数据飞轮","充电/换电基础设施网络效应","头部品牌认知及用户粘性"],
            profitability: {
                grossMargin: "整车企业毛利率：18-25%（纯电） vs 传统燃油 12-15%",
                concentration: "CR5 从2020年 45% 升至2025Q1 58%",
                profitDistribution: "电池环节35%，整车厂15%，上游锂矿20%，软件服务10%+"
            },
            externalFactors: ["政策：双积分、禁燃令、IRA补贴","经济：消费信心、利率","原材料：碳酸锂15-25万/吨","技术：固态电池、800V快充"],
            keyPlayers: [
                { name: "比亚迪", share: "32%", highlight: "全产业链垂直整合" },
                { name: "特斯拉", share: "11%", highlight: "FSD + 超级工厂" },
                { name: "理想汽车", share: "9%", highlight: "增程式+家庭定位" },
                { name: "吉利极氪", share: "7%", highlight: "SEA浩瀚架构" },
                { name: "蔚来", share: "5%", highlight: "换电网络+用户服务" }
            ],
            techRoutes: ["纯电动(BEV) 75%","插电混动(PHEV) 22%","燃料电池(FCEV) <1%","固态/钠离子 研发中"],
            risks: ["补贴退坡","地缘政治风险","充电基建不足","技术路线押注","价格战"],
            prosperity: "待配置"
        };

        // Tab 切换
        document.getElementById('tabIndustry').addEventListener('click', () => switchTab('industry'));
        document.getElementById('tabCompany').addEventListener('click', () => switchTab('company'));

        function switchTab(tab) {
            currentTab = tab;
            const btnIndustry = document.getElementById('tabIndustry');
            const btnCompany = document.getElementById('tabCompany');
            const input = document.getElementById('searchInput');
            if (tab === 'industry') {
                btnIndustry.classList.add('active');
                btnCompany.classList.remove('active');
                input.placeholder = '输入行业名称，如 光伏、创新药...';
                input.value = '新能源汽车';
                renderStaticReport(staticData);
            } else {
                btnCompany.classList.add('active');
                btnIndustry.classList.remove('active');
                input.placeholder = '输入企业名称，如 伊利股份、宁德时代...';
                input.value = '';
                document.getElementById('reportContainer').innerHTML = `
                    <div class="placeholder-note">
                        🏢 企业深度分析<br>
                        <span style="font-size:0.85rem;">请在上方输入企业名称，点击「AI 分析」开始</span>
                    </div>`;
            }
        }

        function renderStaticReport(data) {
            const container = document.getElementById('reportContainer');
            container.innerHTML = `
                <div class="industry-title">${data.name} · 行业透视</div>
                <div class="industry-sub"><span>📍 所属大类：${data.sector}</span><span>📅 数据截至：2025年Q2（示例）</span></div>
                <div class="metrics-grid">
                    <div class="metric-card"><div class="metric-label">渗透率</div><div class="metric-value">${data.penetrationRate}</div><div class="metric-context">乘用车新车渗透率(2025E)</div></div>
                    <div class="metric-card"><div class="metric-label">市场规模</div><div class="metric-value">${data.marketSize}</div><div class="metric-context trend-up">同比增长 ${data.yoyGrowth}</div></div>
                    <div class="metric-card"><div class="metric-label">占大类产业比重</div><div class="metric-value">51%</div><div class="metric-context">${data.shareOfLargerCategory}</div></div>
                    <div class="metric-card"><div class="metric-label">产业生命周期</div><div class="metric-value" style="font-size:1.3rem;">成长→成熟</div><div class="metric-context">${data.stageDetail}</div></div>
                </div>
                <!-- 省略若干卡片，保持原有静态报告不变 -->
                <div class="section-card"><div class="section-title">商业模式</div><div class="section-content">${data.businessModel}</div></div>
                <div class="section-card"><div class="section-title">护城河分析</div><div class="section-content"><ul>${data.moat.map(m => `<li>${m}</li>`).join('')}</ul></div></div>
                <div class="section-card"><div class="section-title">盈利性剖析</div><div class="section-content">
                    <p><strong>毛利率：</strong>${data.profitability.grossMargin}</p>
                    <p><strong>行业集中度：</strong>${data.profitability.concentration}</p>
                    <p><strong>产业链利润分配：</strong>${data.profitability.profitDistribution}</p>
                    <div style="margin-top:0.8rem;">
                        <div class="chart-bar"><span class="label">电池环节</span><div class="bar-bg"><div class="bar-fill" style="width:35%"></div></div><span>35%</span></div>
                        <div class="chart-bar"><span class="label">整车厂</span><div class="bar-bg"><div class="bar-fill" style="width:15%"></div></div><span>15%</span></div>
                        <div class="chart-bar"><span class="label">上游锂矿</span><div class="bar-bg"><div class="bar-fill" style="width:20%"></div></div><span>20%</span></div>
                        <div class="chart-bar"><span class="label">软件/服务</span><div class="bar-bg"><div class="bar-fill" style="width:10%"></div></div><span>10%+</span></div>
                    </div>
                </div></div>
                <div class="section-card"><div class="section-title">外部因素</div><div class="section-content"><ul>${data.externalFactors.map(f => `<li>${f}</li>`).join('')}</ul></div></div>
                <div class="section-card"><div class="section-title">增速与头部公司</div><div class="section-content">
                    <p><strong>行业增速：</strong>2025E 同比 +28.6%</p>
                    <p><strong>头部企业：</strong></p>
                    <div style="margin-top:0.5rem;">${data.keyPlayers.map(p => `
                        <div class="chart-bar"><span class="label">${p.name}</span><div class="bar-bg"><div class="bar-fill" style="width:${parseFloat(p.share)*2.5}%"></div></div><span>${p.share} · ${p.highlight}</span></div>
                    `).join('')}</div>
                </div></div>
                <div class="section-card"><div class="section-title">技术路线</div><div class="section-content"><ul>${data.techRoutes.map(t => `<li>${t}</li>`).join('')}</ul></div></div>
                <div class="section-card"><div class="section-title">风险提示</div><div class="section-content"><ul>${data.risks.map(r => `<li>${r}</li>`).join('')}</ul></div></div>
                <div class="section-card" style="border-left: 3px solid var(--orange);"><div class="section-title">🔮 行业景气度</div><div class="section-content"><p>${data.prosperity}</p></div></div>
            `;
        }

        // AI 报告渲染
        function renderAIReport(md, queryName) {
            let jsonData = null;
            const jsonMatch = md.match(/```json\s*([\s\S]*?)\s*```/);
            if (jsonMatch) { try { jsonData = JSON.parse(jsonMatch[1]); } catch(e) {} }
            let textOnly = md.replace(/```json[\s\S]*?```/, '').trim();
            textOnly = textOnly.replace(/^(好的|您好|根据您的指示|作为.*?，)[\s\S]*?(?=## )/i, '').trim();
            if (!textOnly.startsWith('##')) {
                const firstHeader = textOnly.match(/## /);
                if (firstHeader) textOnly = textOnly.substring(firstHeader.index);
            }

            let html = `<div class="industry-title">${queryName} · AI ${currentTab === 'industry' ? '行业' : '企业'}透视</div>`;
            html += `<div class="industry-sub"><span>🤖 Deepseek实时生成</span><span>📅 ${new Date().toLocaleDateString()}</span></div>`;

            if (jsonData) {
                if (currentTab === 'industry') {
                    html += `<div class="metrics-grid">
                        <div class="metric-card"><div class="metric-label">渗透率</div><div class="metric-value">${jsonData.penetration_rate || '数据暂缺'}</div><div class="metric-context">${jsonData.industry_name || queryName} 当前渗透率</div></div>
                        <div class="metric-card"><div class="metric-label">市场规模</div><div class="metric-value">${jsonData.market_size || '数据暂缺'}</div><div class="metric-context trend-up">同比增长 ${jsonData.yoy_growth || '数据暂缺'}</div></div>
                        <div class="metric-card"><div class="metric-label">产业生命周期</div><div class="metric-value" style="font-size:1.3rem;">${jsonData.lifecycle_stage || '数据暂缺'}</div><div class="metric-context">CR4 集中度: ${jsonData.cr4 || '数据暂缺'}</div></div>
                        <div class="metric-card"><div class="metric-label">景气度</div><div class="metric-value">${jsonData.prosperity_level || '数据暂缺'} <span>${jsonData.prosperity_trend || ''}</span></div><div class="metric-context">投资建议: ${jsonData.investment_advice || '数据暂缺'} | 毛利率: ${jsonData.gross_margin_range || '数据暂缺'}</div></div>
                    </div>`;
                } else {
                    html += `<div class="metrics-grid">
                        <div class="metric-card"><div class="metric-label">营收增速</div><div class="metric-value">${jsonData.revenue_growth || '数据暂缺'}</div><div class="metric-context">${jsonData.company_name || queryName} 同比增速</div></div>
                        <div class="metric-card"><div class="metric-label">毛利率</div><div class="metric-value">${jsonData.gross_margin || '数据暂缺'}</div><div class="metric-context">盈利能力</div></div>
                        <div class="metric-card"><div class="metric-label">ROE</div><div class="metric-value">${jsonData.roe || '数据暂缺'}</div><div class="metric-context">扣非净利润增速: ${jsonData.deducted_net_profit_growth || '数据暂缺'}</div></div>
                        <div class="metric-card"><div class="metric-label">综合质地</div><div class="metric-value">${jsonData.prosperity_level || '数据暂缺'}</div><div class="metric-context">投资建议: ${jsonData.investment_advice || '数据暂缺'} | PE: ${jsonData.pe || '数据暂缺'}</div></div>
                    </div>`;
                }
            }

            const sections = textOnly.split(/(?=^## )/gm);
            sections.forEach(section => {
                const lines = section.trim().split('\n');
                if (lines.length === 0) return;
                const title = lines[0].replace(/^## /, '').replace(/\*\*/g, '');
                const mdContent = lines.slice(1).join('\n').trim();
                let contentHtml = mdContent ? marked.parse(mdContent) : '';
                html += `<div class="section-card"><div class="section-title">${title}</div><div class="section-content">${contentHtml}</div></div>`;
            });

            if (currentTab === 'company') {
                html += `<div class="section-card" style="text-align: center; border: 1px dashed var(--accent); background: transparent;">
                    <div style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem;">📄 以上为15个维度的详细分析，可基于此生成深度综合投资分析报告</div>
                    <button id="genReportBtn" class="search-btn" style="padding: 0.6rem 2rem;">生成综合投资分析报告</button>
                </div>`;
            }

            setTimeout(() => {
                const btn = document.getElementById('genReportBtn');
                if (btn) {
                    btn.addEventListener('click', async () => {
                        const cards = document.querySelectorAll('.section-card');
                        let contentText = '';
                        cards.forEach((card, index) => {
                            const title = card.querySelector('.section-title')?.innerText;
                            const content = card.querySelector('.section-content')?.innerText;
                            if (title && content && index < cards.length - 1) {
                                contentText += `## ${title}\n${content}\n\n`;
                            }
                        });

                        const genCard = btn.closest('.section-card');
                        genCard.innerHTML = `
                            <div class="loading-text" style="padding:1rem;">
                                <span class="loading-bounce-inline">⏳</span> 正在基于前15个维度生成深度投资分析报告，预计需要20-30秒...
                            </div>
                        `;

                        try {
                            const resp = await fetch(`${API_BASE}/generate_company_report`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ company_name: document.getElementById('searchInput').value.trim(), content: contentText })
                            });
                            const data = await resp.json();
                            if (data.status === 'success') {
                                let md = data.report;
                                let reportHtml = marked.parse(md.replace(/```json[\s\S]*?```/, ''));
                                reportHtml = reportHtml.replace(/<\/?p>/g, '');
                                let formatted = marked.parse(md.replace(/```json[\s\S]*?```/, ''));
                                // 去掉多余的 p 标签，保留内部样式
                                formatted = formatted.replace(/<\/?p>/g, '');
                                // 把 ## 标题转为带样式的 h2
                                formatted = formatted.replace(/<h2>/g, '<h2 style="font-size:1.1rem; font-weight:650; color:#fff; margin:1.2rem 0 0.5rem 0; padding-left:0.8rem; border-left:3px solid var(--accent);">');
                                const docHtml = `
                                    <div class="report-document" id="fullReport">
                                        ${reportHtml}
                                        <div style="text-align: right; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #555;">
                                            <button onclick="window.print()" class="search-btn export-pdf-btn" style="padding: 0.5rem 1.5rem;">📄 导出 PDF</button>
                                            <p style="font-size:0.8rem; color:#888; margin-top:0.4rem;">点击后请在弹出的打印对话框中选择「另存为 PDF」</p>
                                        </div>
                                    </div>
                                `;
                                genCard.outerHTML = docHtml;
                            } else {
                                const errDetail = typeof data.detail === 'string' ? data.detail : JSON.stringify(data.detail);
                                genCard.innerHTML = `<div class="error-text">❌ 分析失败：${errDetail}</div>`;
                            }
                        } catch (err) {
                            console.error('请求错误:', err);
                            let errMsg = '无法连接到后端，请确认 server.py 已启动。';
                            if (err.message) errMsg = err.message;
                            genCard.innerHTML = `<div class="error-text">❌ ${errMsg}</div>`;
                        }
                    });
                }
            }, 100);
            return html;
        }

        // 搜索处理
        async function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            if (currentTab === 'industry' && query === '新能源汽车') {
                renderStaticReport(staticData);
                return;
            }

            const container = document.getElementById('reportContainer');
            const btn = document.getElementById('searchBtn');
            btn.disabled = true;

            container.innerHTML = `
                <div class="loading-text" id="loadingBlock">
                    <div id="progressList" style="text-align: left; max-width: 400px; margin: 1rem auto 0; color: var(--text-secondary); font-size: 0.9rem;">
                        <div><span class="loading-bounce-inline">⏳</span> 正在启动分析引擎…</div>
                    </div>
                </div>
            `;

            const progressList = document.getElementById('progressList');
            const steps = [
                `🔍 正在收集「${query}」的行业基础数据…`,
                `📊 正在分析竞争格局与市场份额…`,
                `📉 正在评估景气度与风险指标…`,
                `📄 正在生成结构化分析报告…`
            ];
            let stepIndex = 0;
            const timer = setInterval(() => {
                if (stepIndex < steps.length) {
                    const stepDiv = document.createElement('div');
                    stepDiv.textContent = steps[stepIndex];
                    progressList.appendChild(stepDiv);
                    stepIndex++;
                }
            }, 2000);
            container._loadingTimer = timer;

            try {
                const endpoint = currentTab === 'industry' ? '/analyze' : '/analyze_company';
                const bodyKey = currentTab === 'industry' ? 'industry_name' : 'company_name';
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        [bodyKey]: query,
                        analysis_mode: document.getElementById('analysisMode').value,
                        ...(document.getElementById('userDataInput').value.trim() ? { user_data: document.getElementById('userDataInput').value.trim() } : {})
                    })
                });
                let data;
                try { data = await response.json(); } catch (jsonErr) {
                    console.error('响应不是有效的 JSON', jsonErr);
                    container.innerHTML = `<div class="error-text">❌ 后端返回了无效数据，请查看终端日志</div>`;
                    return;
                }
                if (data && data.status === 'success') {
                    container.innerHTML = renderAIReport(data.report, query);
                } else {
                    const errDetail = data?.detail || '未知错误';
                    container.innerHTML = `<div class="error-text">❌ 分析失败：${errDetail}</div>`;
                }
            } catch (err) {
                console.error('请求错误:', err);
                let errMsg = '无法连接到后端，请确认 server.py 已启动。';
                if (err.message) errMsg = err.message;
                container.innerHTML = `<div class="error-text">❌ ${errMsg}</div>`;
            } finally {
                btn.disabled = false;
                if (container._loadingTimer) {
                    clearInterval(container._loadingTimer);
                    delete container._loadingTimer;
                }
            }
        }

        document.getElementById('searchBtn').addEventListener('click', handleSearch);
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        window.addEventListener('DOMContentLoaded', () => renderStaticReport(staticData));
    </script>
</body>
</html>
